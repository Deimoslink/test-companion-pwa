<ion-item-sliding>
  <ion-item lines="none" [class.active-item]="isExpanded" (click)="toggleExpand.emit()">
    <ion-icon
      [name]="isPlaying() ? 'pause-circle-outline' : 'play-circle-outline'"
      slot="start"
      color="primary"
      (click)="playPause($event)">
    </ion-icon>

    <ion-label>
      <h2>{{ recording.metadata?.name || 'Аудиозапись' }}</h2>
      <p>{{ recording.timestamp | date:'HH:mm' }} • {{ (recording.blob.size / 1024) | number:'1.0-0' }} KB</p>
    </ion-label>

    <ion-icon name="trash-outline"
              slot="end"
              color="danger"
              (click)="delete.emit(recording.id); $event.stopPropagation()">

    </ion-icon>

  </ion-item>

  @if (isExpanded) {
    <div class="player-controls ion-padding-horizontal">
      <ion-range
        [max]="duration()"
        [value]="currentTime()"
        (ionKnobMoveEnd)="seek($event)"
        color="primary">
        <ion-label slot="start" class="time-label">{{ formatTime(currentTime()) }}</ion-label>
        <ion-label slot="end" class="time-label">{{ formatTime(duration()) }}</ion-label>
      </ion-range>
    </div>
  }

  <ion-item-options side="end">
    <ion-item-option color="danger" (click)="delete.emit(recording.id)">
      <ion-icon name="trash-outline" slot="icon-only"></ion-icon>
    </ion-item-option>
  </ion-item-options>
</ion-item-sliding>
